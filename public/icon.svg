<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" fill="none">
  <defs>
    <!-- Branding colors based on the app's green theme #4A5D4E -->
    <linearGradient id="brand-green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A5D4E"/>
      <stop offset="100%" stop-color="#2D3B30"/>
    </linearGradient>
    <linearGradient id="accent-green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8FA493"/>
      <stop offset="100%" stop-color="#4A5D4E"/>
    </linearGradient>
    <linearGradient id="light-green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6E2D8"/>
      <stop offset="100%" stop-color="#A5B8AA"/>
    </linearGradient>
    <filter id="gentle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#4A5D4E" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Circular background to preserve maskable aesthetic for home screen install -->
  <circle cx="250" cy="245" r="225" fill="#FCFBF7" stroke="#ECE9DE" stroke-width="2" />
  <circle cx="250" cy="245" r="210" stroke="#4A5D4E" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="6 4" fill="none" />

  <!-- The Centered Stylized Pot with Sprout/Seedling Design -->
  <g transform="translate(0, -15)" filter="url(#gentle-shadow)">
    <!-- Soil mound in the pot -->
    <path d="M 185 295 Q 250 280 315 295" stroke="#4A5D4E" stroke-width="2" fill="none" />

    <!-- Stem of the sprout -->
    <!-- Thick elegant main stem branching up from pot -->
    <path d="M 250 290 Q 240 220 252 140" stroke="url(#brand-green-grad)" stroke-width="10" stroke-linecap="round" fill="none" />
    <path d="M 252 140 Q 262 105 285 85" stroke="url(#brand-green-grad)" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- Leaves: Modern, flat, dual-tone geometric organic shapes -->
    <!-- Leaf 1 (Bottom Left) -->
    <path d="M 245 240 C 205 245, 175 220, 195 185 C 215 185, 240 205, 245 240 Z" fill="url(#accent-green-grad)" />
    <path d="M 245 240 C 220 225, 205 210, 195 185 C 215 185, 230 195, 245 240 Z" fill="url(#light-green-grad)" opacity="0.8" />
    <path d="M 245 240 C 205 245, 175 220, 195 185 C 215 185, 240 205, 245 240" stroke="#4A5D4E" stroke-width="2.5" stroke-linejoin="round" fill="none" />

    <!-- Leaf 2 (Middle Right) -->
    <path d="M 248 190 C 290 195, 320 170, 300 135 C 280 135, 255 155, 248 190 Z" fill="url(#accent-green-grad)" />
    <path d="M 248 190 C 273 175, 288 160, 300 135 C 280 135, 265 145, 248 190 Z" fill="url(#light-green-grad)" opacity="0.8" />
    <path d="M 248 190 C 290 195, 320 170, 300 135 C 280 135, 255 155, 248 190" stroke="#4A5D4E" stroke-width="2.5" stroke-linejoin="round" fill="none" />

    <!-- Leaf 3 (Top Left branch) -->
    <path d="M 252 140 C 225 130, 210 100, 235 75 C 250 85, 255 115, 252 140 Z" fill="url(#light-green-grad)" />
    <path d="M 252 140 C 225 130, 210 100, 235 75 C 250 85, 255 115, 252 140" stroke="#4A5D4E" stroke-width="2.5" stroke-linejoin="round" fill="none" />

    <!-- Leaf 4 (Top Sprout Terminal) -->
    <path d="M 285 85 C 295 55, 275 35, 245 45 C 245 65, 265 80, 285 85 Z" fill="url(#accent-green-grad)" />
    <path d="M 285 85 C 295 55, 275 35, 245 45" stroke="#4A5D4E" stroke-width="2.5" stroke-linejoin="round" fill="none" />

    <!-- Stylized modern pot / planter -->
    <!-- Pot Rim -->
    <rect x="165" y="290" width="170" height="15" rx="7.5" fill="url(#brand-green-grad)" stroke="#4A5D4E" stroke-width="3" />
    <!-- Pot Body (Tapered) -->
    <path d="M 178 305 L 195 390 C 197 398, 203 405, 212 405 H 288 C 297 405, 303 398, 305 390 L 322 305 Z" fill="url(#light-green-grad)" stroke="#4A5D4E" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Pot accent pattern - minimalist line cutouts -->
    <path d="M 215 330 H 285" stroke="#4A5D4E" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
    <path d="M 225 355 H 275" stroke="#4A5D4E" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
    <path d="M 235 380 H 265" stroke="#4A5D4E" stroke-width="2.1" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Beautiful typography for consistent app identity design -->
  <text x="250" y="445" 
        text-anchor="middle" 
        font-family="'Inter', 'Outfit', 'Space Grotesk', sans-serif" 
        font-size="16" 
        font-weight="bold" 
        letter-spacing="5" 
        fill="#4A5D4E">DEVAKUSUMA</text>
</svg>
