<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" fill="none">
  <defs>
    <!-- Organic golden accent gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C185"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#AA7C11"/>
      <stop offset="100%" stop-color="#F3E5AB"/>
    </linearGradient>
    
    <!-- Rich deep premium forest green gradient -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B382B"/>
      <stop offset="100%" stop-color="#0F241B"/>
    </linearGradient>

    <!-- Spring fresh green for leaf details -->
    <linearGradient id="sprout-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8DB640"/>
      <stop offset="100%" stop-color="#4E7026"/>
    </linearGradient>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Ambient light outer background to preserve editorial aesthetic if displayed standalone -->
  <circle cx="250" cy="250" r="235" fill="#FCFBF7" stroke="#ECE9DE" stroke-width="1.5" />

  <!-- Outer Double Gold Ring Frame -->
  <circle cx="250" cy="242" r="185" stroke="url(#gold-grad)" stroke-width="2" fill="none" />
  <circle cx="250" cy="242" r="180" stroke="url(#gold-grad)" stroke-width="0.8" stroke-dasharray="4 3" fill="none" />

  <!-- Top Curved Leaf Sprays (Circular Border Accent) -->
  <path d="M 120 120 C 145 85, 200 70, 250 70" stroke="url(#gold-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <path d="M 380 120 C 355 85, 300 70, 250 70" stroke="url(#gold-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" />
  
  <!-- Left Side Top Leaves -->
  <path d="M 140 108 C 130 95, 115 105, 125 115 C 135 125, 145 120, 140 108 Z" fill="url(#sprout-grad)" />
  <path d="M 175 92 C 168 80, 150 85, 160 100 C 170 115, 180 105, 175 92 Z" fill="url(#gold-grad)" />
  <path d="M 215 80 C 210 65, 192 70, 202 85 C 212 100, 220 90, 215 80 Z" fill="url(#sprout-grad)" />

  <!-- Right Side Top Leaves -->
  <path d="M 360 108 C 370 95, 385 105, 375 115 C 365 125, 355 120, 360 108 Z" fill="url(#sprout-grad)" />
  <path d="M 325 92 C 332 80, 350 85, 340 100 C 330 115, 320 105, 325 92 Z" fill="url(#gold-grad)" />
  <path d="M 285 80 C 290 65, 308 70, 298 85 C 288 100, 280 90, 285 80 Z" fill="url(#sprout-grad)" />

  <!-- Central Monogram "DK" artwork in bold editorial serif -->
  <g transform="translate(115, 95)" filter="url(#soft-shadow)">
    <!-- Elegant Botanical Leaf wrapping the letters -->
    <path d="M 60 130 C 50 100, 100 60, 140 70 C 110 95, 115 120, 142 125 C 110 140, 80 150, 60 130 Z" fill="url(#sprout-grad)" opacity="0.9" />
    <path d="M 135 90 C 155 70, 210 65, 200 105 C 185 135, 145 130, 135 90 Z" fill="url(#gold-grad)" opacity="0.85" />

    <!-- 'D' - styled vector path for perfect resolution across platforms -->
    <path d="M 25 35 L 75 35 C 120 35, 145 55, 145 100 C 145 145, 115 165, 75 165 L 25 165 Z 
             M 55 58 L 55 142 L 72 142 C 98 142, 114 128, 114 100 C 114 72, 98 58, 72 58 Z" 
          fill="url(#green-grad)" stroke="url(#gold-grad)" stroke-width="1.8" />
          
    <!-- 'K' - styled vector path overlapping elegantly with 'D' -->
    <path d="M 130 35 L 160 35 L 160 95 L 210 35 L 245 35 L 185 105 L 250 165 L 212 165 L 160 115 L 160 165 L 130 165 Z" 
          fill="url(#green-grad)" stroke="url(#gold-grad)" stroke-width="1.8" />
  </g>

  <!-- Grounding Garden Plant Sprouts around Monogram -->
  <g transform="translate(50, 255)">
    <!-- Decorative side vector ferns -->
    <path d="M 30 15 C 20 8, 5 -10, -5 -2 C -15 6, -5 20, 15 18 C 25 15, 35 22, 30 15 Z" fill="url(#sprout-grad)" />
    <path d="M 370 15 C 380 8, 395 -10, 405 -2 C 415 6, 405 20, 385 18 C 375 15, 365 22, 370 15 Z" fill="url(#sprout-grad)" />
  </g>

  <!-- "DEVAKUSUMA" Main Caption -->
  <text x="250" y="365" 
        text-anchor="middle" 
        font-family="'Playfair Display', 'Didot', 'Georgia', 'serif'" 
        font-size="38" 
        font-weight="bold" 
        letter-spacing="5" 
        fill="#11291F" 
        filter="url(#soft-shadow)">DEVAKUSUMA</text>
        
  <!-- "NURSERY GARDENS" Subtitle -->
  <text x="250" y="398" 
        text-anchor="middle" 
        font-family="'Inter', 'Montserrat', 'sans-serif'" 
        font-size="13" 
        font-weight="800" 
        letter-spacing="6" 
        fill="#B89443">NURSERY GARDENS</text>

  <!-- Accent Bottom Scroll Lines -->
  <path d="M 120 415 L 195 415" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="205" cy="415" r="3" fill="#B89443" />
  
  <!-- Flowering decorative center bottom element -->
  <path d="M 240 430 C 240 420, 245 425, 250 418 C 255 425, 260 420, 260 430 C 255 435, 245 435, 240 430 Z" fill="url(#sprout-grad)" />
  <path d="M 228 426 C 233 420, 238 423, 243 429" stroke="url(#gold-grad)" stroke-width="1.2" fill="none" />
  <path d="M 272 426 C 267 420, 262 423, 257 429" stroke="url(#gold-grad)" stroke-width="1.2" fill="none" />

  <circle cx="295" cy="415" r="3" fill="#B89443" />
  <path d="M 305 415 L 380 415" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round" />
</svg>
